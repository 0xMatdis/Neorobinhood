<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO ROBINHOOD • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: #0A0A0F; color: white; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .cyber-card { background: rgba(15, 15, 26, 0.95); border: 1px solid rgba(0, 255, 159, 0.2); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="font-display text-5xl text-center mb-2">NEO ROBINHOOD</h1>
        <p class="text-center text-[#00ff9f] mb-10">Cyberpunk Terminal Dashboard</p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="cyber-card rounded-3xl p-8">
                <h3 class="text-xl mb-4">Portfolio Value</h3>
                <div class="text-5xl font-display">$142,840</div>
                <div class="text-emerald-400">+18.4% this month</div>
            </div>

            <div class="cyber-card rounded-3xl p-8">
                <h3 class="text-xl mb-4">Quick Command</h3>
                <input id="cmd" type="text" class="w-full bg-black/50 border border-white/20 rounded-xl px-4 py-3 text-white" placeholder="buy $500 NVDA on robinhood">
                <button onclick="alert('Command sent to Bankrbot! ✅')" 
                        class="mt-4 w-full bg-[#00ff9f] text-black font-bold py-3 rounded-xl">EXECUTE</button>
            </div>

            <div class="cyber-card rounded-3xl p-8">
                <h3 class="text-xl mb-4">Status</h3>
                <div class="space-y-3">
                    <div class="flex justify-between"><span>GRID</span><span class="text-[#00ff9f]">● ONLINE</span></div>
                    <div class="flex justify-between"><span>BANKRBOT</span><span class="text-[#00ff9f]">● LINKED</span></div>
                    <div class="flex justify-between"><span>ROBINHOOD CHAIN</span><span class="text-[#00ff9f]">● SYNCED</span></div>
                </div>
            </div>
        </div>

        <div class="text-center mt-12 text-white/40 text-sm">
            Made for <a href="https://x.com/0xmatdis" class="hover:text-white">@0xmatdis</a>
        </div>
    </div>
</body>
</html>
