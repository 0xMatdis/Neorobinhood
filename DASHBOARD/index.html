<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO ROBINHOOD // TERMINAL v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #050507;
            color: #00ff9f;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        .neon { text-shadow: 0 0 20px #00ff9f, 0 0 40px #00ff9f; }
        .pink-neon { text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff00aa; }
        .grid-bg {
            background-image: 
                linear-gradient(#00ff9f 1px, transparent 1px),
                linear-gradient(90deg, #00ff9f 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.08;
        }
        .scanline {
            position: relative;
        }
        .scanline::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(transparent, #00ff9f, transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }
        .glitch {
            animation: glitch 1s linear infinite alternate;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="grid-bg min-h-screen scanline">
    <div class="max-w-6xl mx-auto px-8 py-10">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-7xl font-bold tracking-tighter neon glitch">NEO ROBINHOOD</h1>
                <p class="pink-neon text-2xl -mt-3">CYBERPUNK TERMINAL // ONLINE</p>
            </div>
            <div class="text-right">
                <div class="text-[#ff00aa] text-sm">OPERATOR</div>
                <div class="font-mono">@0xmatdis</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Portfolio -->
            <div class="lg:col-span-5 bg-black/80 border border-[#00ff9f]/30 rounded-3xl p-10">
                <div class="flex justify-between">
                    <div>
                        <div class="text-white/60 text-sm">TOTAL VALUE</div>
                        <div class="text-6xl font-mono mt-2">$142,840</div>
                    </div>
                    <div class="text-emerald-400 text-6xl">▲</div>
                </div>
                <div class="text-emerald-400 text-2xl mt-4">+18.4% THIS CYCLE</div>
            </div>

            <!-- Command -->
            <div class="lg:col-span-7 bg-black/80 border border-[#ff00aa]/30 rounded-3xl p-10">
                <div class="text-pink-400 text-xl mb-6">COMMAND CONSOLE</div>
                <input id="cmd" type="text" class="w-full bg-black border border-white/30 rounded-2xl px-8 py-6 text-xl font-mono focus:outline-none focus:border-[#00ff9f]" placeholder="buy $1000 NVDA on robinhood">
                <button onclick="executeCmd()" class="mt-6 w-full py-6 text-xl font-bold bg-gradient-to-r from-[#ff00aa] to-[#00ffff] text-black rounded-2xl hover:scale-105 transition">
                    TRANSMIT TO GRID
                </button>
            </div>
        </div>

        <div class="mt-12 text-center text-white/30 text-sm font-mono">
            SYSTEM STABLE • ROBINHOOD CHAIN SYNCED • BANKRBOT LINKED
        </div>
    </div>

    <script>
        function executeCmd() {
            const input = document.getElementById('cmd');
            if (input.value) {
                alert("⚡ COMMAND TRANSMITTED TO BANKRBOT\n\n" + input.value + "\n\nAwaiting confirmation on the grid...");
                input.value = '';
            }
        }
    </script>
</body>
</html>
