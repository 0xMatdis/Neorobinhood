<!DOCTYPE html>
<html lang="en">
<head>

    <title>NEO ROBINHOOD TERMINAL</title>

        body {

            background-image: 
                linear-gradient(#00ff9f 1px, transparent 1px),
                linear-gradient(90deg, #00ff9f 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.9;
        }
        .container {
            max-width: 1100px;

            padding: 40px 20px;
        }
        h1 {
            font-size: 4.5rem;
            text-align: center;

        }
        .subtitle {
            text-align: center;
            color: #ff00aa;
            font-size: 1.5rem;

        }
        .card {
            background: rgba(10, 10, 20, 0.95);
            border: 2px solid #00ff9f;
            padding: 30px;
            margin-bottom: 30px;

        button {

            font-size: 1.3rem;

            width: 100%;
            border-radius: 8px;
        }

</head>
<body>
    <div class="container">

        <div class="card">

            OPERATOR @0xmatdis • CONNECTED TO ROBINHOOD CHAIN
        </div>

    <script>
        function sendCommand() {
            const cmd = document.getElementById('cmd').value;
            if (cmd) {
                alert("⚡ COMMAND SENT TO BANKRBOT:\n\n" + cmd);
                document.getElementById('cmd').value = '';

</html>
